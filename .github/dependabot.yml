version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      aws-sdk:
        patterns:
          - '@aws-sdk/*'
      testing:
        patterns:
          - 'mocha'
          - 'chai'
          - 'sinon'
          - 'c8'
          - '@types/mocha'
          - '@types/chai'
          - '@types/sinon'
      types:
        patterns:
          - '@types/*'
        exclude-patterns:
          - '@types/mocha'
          - '@types/chai'
          - '@types/sinon'
      linting:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - '@typescript-eslint/*'
      typescript:
        patterns:
          - 'typescript'
      fastmcp:
        patterns:
          - 'fastmcp'
    cooldown:
      default-days: 3
    ignore:
      # TypeScript 7 (native/Go compiler) ships without a JS API; blocked until
      # typescript-eslint supports it.
      # See https://github.com/typescript-eslint/typescript-eslint/issues/10940
      - dependency-name: typescript
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      default-days: 3
